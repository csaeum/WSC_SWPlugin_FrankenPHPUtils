stages:
  - quality
  - security
  - build
  - release
  - deploy

include:
  - local: .gitlab/ci/10-cs-check.yml
  - local: .gitlab/ci/20-phpstan.yml
  - local: .gitlab/ci/30-sast.yml
  - local: .gitlab/ci/99-zip.yml

sync-to-github:
  stage: deploy
  image: alpine:latest
  needs:
    - job: build-zip
      artifacts: true
  before_script:
    - apk add --no-cache curl git
  rules:
    - if: '$CI_COMMIT_TAG'
  script: |
    YEAR=$(date +%Y)
    PLUGIN_NAME=$(basename "$CI_PROJECT_DIR")
    ZIP_NAME="${PLUGIN_NAME}.zip"
    curl --header "PRIVATE-TOKEN:${GITLAB_TOKEN}" "${CI_API_V4_URL}/projects/csaeum%2Fdev-templates/repository/files/Header.md/raw?ref=main" -o /tmp/header.md
    curl --header "PRIVATE-TOKEN:${GITLAB_TOKEN}" "${CI_API_V4_URL}/projects/csaeum%2Fdev-templates/repository/files/Footer.md/raw?ref=main" -o /tmp/footer.md
    sed -i "s/\${PLUGIN_NAME}/${GITHUB_REPO}/g" /tmp/header.md
    sed -i "s/\${PLUGIN_GRUPPE}/${CI_PROJECT_NAMESPACE}/g" /tmp/header.md
    sed -i "s/\${GITHUB_USER}/${GITHUB_USER}/g" /tmp/header.md
    sed -i "s/\${GITHUB_REPO}/${GITHUB_REPO}/g" /tmp/header.md
    sed -i "s/\${YEAR}/${YEAR}/g" /tmp/footer.md
    cat /tmp/header.md README.md /tmp/footer.md > /tmp/README_final.md
    cp /tmp/README_final.md README.md
    git config user.email "ci@gitlab.local"
    git config user.name "GitLab CI"
    git fetch --unshallow || true
    git remote add github https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${GITHUB_REPO}.git
    git add README.md
    git commit -m "chore: add header and footer to README" || true
    git push github HEAD:refs/heads/main --follow-tags --force
    RELEASE_RESPONSE=$(curl -s \
      -H "Authorization: token ${GITHUB_TOKEN}" \
      "https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/releases/tags/${CI_COMMIT_TAG}")
    echo "GitHub Response: $RELEASE_RESPONSE"
    RELEASE_ID=$(echo "$RELEASE_RESPONSE" | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')
    if [ -z "$RELEASE_ID" ]; then
      RELEASE_RESPONSE=$(curl -s -X POST \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "{\"tag_name\":\"${CI_COMMIT_TAG}\",\"name\":\"${CI_COMMIT_TAG}\",\"body\":\"Release ${CI_COMMIT_TAG}\"}" \
        "https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/releases")
      echo "GitHub Create Response: $RELEASE_RESPONSE"
      RELEASE_ID=$(echo "$RELEASE_RESPONSE" | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')
    fi
    echo "Release ID: $RELEASE_ID"
    if [ -z "$RELEASE_ID" ]; then
      echo "ERROR: Release ID konnte nicht ermittelt werden"
      exit 1
    fi
    echo "ZIP Datei vorhanden: $(ls -la ${ZIP_NAME} 2>&1)"
    curl -s -X POST \
      -H "Authorization: token ${GITHUB_TOKEN}" \
      -H "Content-Type: application/zip" \
      --data-binary "@${ZIP_NAME}" \
      "https://uploads.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/releases/${RELEASE_ID}/assets?name=${ZIP_NAME}"