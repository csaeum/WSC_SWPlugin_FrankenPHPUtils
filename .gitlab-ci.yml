stages:
  - quality
  - security
  - build
  - release
  - deploy

include:
  - local: .gitlab/ci/10-cs-check.yml
  - local: .gitlab/ci/20-phpstan.yml
  - local: .gitlab/ci/30-sast.yml
  - local: .gitlab/ci/99-zip.yml

sync-to-github:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    # Templates herunterladen
    - curl --header "PRIVATE-TOKEN:${GITLAB_TOKEN}" "http://gitlab.localdomain/csaeum/dev-templates/-/raw/main/Header.md" -o /tmp/header.md
    - curl --header "PRIVATE-TOKEN:${GITLAB_TOKEN}" "http://gitlab.localdomain/csaeum/dev-templates/-/raw/main/Footer.md" -o /tmp/footer.md

    # Platzhalter ersetzen
    - sed -i "s/\${PLUGIN_NAME}/${CI_PROJECT_NAME}/g" /tmp/header.md
    - sed -i "s/\${GITHUB_USER}/${GITHUB_USER}/g" /tmp/header.md
    - sed -i "s/\${GITHUB_REPO}/${GITHUB_REPO}/g" /tmp/header.md
    - sed -i "s/\${YEAR}/$(date +%Y)/g" /tmp/footer.md

    # README zusammensetzen
    - cat /tmp/header.md README.md /tmp/footer.md > /tmp/README_final.md
    - cp /tmp/README_final.md README.md

    # Zu GitHub pushen
    - git config user.email "ci@gitlab.local"
    - git config user.name "GitLab CI"
    - git remote add github https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${GITHUB_REPO}.git
    - git add README.md
    - git commit -m "chore: add header and footer to README" || true
    - git push github HEAD:main --follow-tags