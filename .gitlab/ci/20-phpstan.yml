phpstan:
  stage: security
  image: php:8.3-cli
  before_script:
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer require --dev phpstan/phpstan phpstan/extension-installer --no-interaction --no-progress
  script:
    - vendor/bin/phpstan analyse src/ --level=3 --no-progress
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_TAG =~ /^v.*/