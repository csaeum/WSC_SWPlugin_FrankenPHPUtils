build-zip:
  stage: build
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  before_script:
    - apk add --no-cache git zip
  script:
    - PLUGIN_NAME=$(basename "$CI_PROJECT_DIR")
    - ZIP_NAME="${PLUGIN_NAME}.zip"
    - git archive --format=zip --prefix="${PLUGIN_NAME}/" "${CI_COMMIT_TAG}" -o "/tmp/${ZIP_NAME}"
    - cp "/tmp/${ZIP_NAME}" .
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_COMMIT_TAG"
    paths:
      - "*.zip"
    expire_in: 90 days

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  needs:
    - job: build-zip
      artifacts: true
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Release $CI_COMMIT_TAG"
    description: "Automatisch erstelltes Release für $CI_COMMIT_TAG"
    assets:
      links:
        - name: "$CI_PROJECT_NAME.zip"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/$CI_PROJECT_NAME.zip?job=build-zip"