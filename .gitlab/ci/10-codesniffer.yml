codesniffer:
  stage: quality
  image: php:8.3-cli
  before_script:
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer require --dev shopware/coding-standards --no-interaction --no-progress
  script:
    - vendor/bin/phpcs --standard=Shopware src/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_TAG =~ /^v.*/